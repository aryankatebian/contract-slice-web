<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Plan — locked</title>
<style>
  :root{ --bg:#f4f3ef; --surface:#fff; --border:#e5e3db; --ink:#1c1e22; --muted:#6b6e75; --accent:#0e9074; --accent-soft:#e3f1ec; --accent-ink:#fff; }
  @media (prefers-color-scheme:dark){ :root{ --bg:#15171c; --surface:#1d2026; --border:#2e323b; --ink:#ecedef; --muted:#9a9ea7; --accent:#18a98a; --accent-soft:#16302a; --accent-ink:#0c1512; } }
  *{box-sizing:border-box}
  body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink)}
  #gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .box{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 28px;box-shadow:0 8px 30px rgba(0,0,0,.08);text-align:center}
  .lock{font-size:34px}
  h1{font-family:"Iowan Old Style",Palatino,Georgia,serif;font-weight:600;font-size:24px;margin:14px 0 4px}
  p.sub{color:var(--muted);font-size:14px;margin:0 0 22px}
  form{display:flex;flex-direction:column;gap:10px}
  input{font:inherit;font-size:15px;padding:11px 14px;border:1px solid var(--border);border-radius:9px;background:var(--bg);color:var(--ink);text-align:center}
  input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  button{font:inherit;font-size:15px;font-weight:600;padding:11px;border:0;border-radius:9px;background:var(--accent);color:var(--accent-ink);cursor:pointer}
  button:hover{filter:brightness(1.05)}
  .err{color:#c0392b;font-size:13px;min-height:18px;margin-top:2px}
  @media (prefers-color-scheme:dark){ .err{color:#ff8a80} }
  #frame{position:fixed;inset:0;width:100%;height:100%;border:0;background:var(--bg)}
  [hidden]{display:none!important}
</style>
</head>
<body>
  <div id="gate">
    <div class="box">
      <div class="lock">🥧🔒</div>
      <h1>The Plan</h1>
      <p class="sub">Enter the password to view.</p>
      <form id="f">
        <input id="pw" type="password" placeholder="Password" autocomplete="current-password" autofocus>
        <button type="submit">Unlock</button>
        <div class="err" id="err"></div>
      </form>
    </div>
  </div>
  <iframe id="frame" hidden title="The Plan"></iframe>

    var ITER = 250000;

    function b64ToBytes(b64){ var bin = atob(b64); var a = new Uint8Array(bin.length); for(var i=0;i<bin.length;i++) a[i]=bin.charCodeAt(i); return a; }

    async function decrypt(password){
      var data = b64ToBytes(BLOB);
      var salt = data.slice(0,16), iv = data.slice(16,28), ctTag = data.slice(28);
      var enc = new TextEncoder();
      var baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
      var key = await crypto.subtle.deriveKey({name:'PBKDF2', salt:salt, iterations:ITER, hash:'SHA-256'}, baseKey, {name:'AES-GCM', length:256}, false, ['decrypt']);
      var pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:iv}, key, ctTag);
      return new TextDecoder().decode(pt);
    }

    function reveal(html){
      var frame = document.getElementById('frame');
      frame.srcdoc = html;
      frame.hidden = false;
      document.getElementById('gate').hidden = true;
    }

    async function tryUnlock(pw, silent){
      try {
        var html = await decrypt(pw);
        try { sessionStorage.setItem('sp', pw); } catch(e){}
        reveal(html);
        return true;
      } catch(e){
        if(!silent){ document.getElementById('err').textContent = 'Wrong password — try again.'; }
        return false;
      }
    }

    document.getElementById('f').addEventListener('submit', function(e){
      e.preventDefault();
      document.getElementById('err').textContent = '';
      tryUnlock(document.getElementById('pw').value, false);
    });

    (function(){ try { var s = sessionStorage.getItem('sp'); if(s) tryUnlock(s, true); } catch(e){} })();
